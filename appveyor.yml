version: 3.0.{build}

image: Visual Studio 2022

platform: x64

# No hay tests — evita que AppVeyor busque resultados de test y falle
test: off

environment:
  PYTHON: "C:\\Python311-x64"
  PATH: "%PYTHON%;%PYTHON%\\Scripts;%PATH%"

install:
  - cmd: python --version
  - cmd: python -m pip install --upgrade pip
  - cmd: python -m pip install -r requirements-app.txt
  - cmd: python -m pip install pyinstaller==6.19.0
  - cmd: python -m playwright install chromium

build_script:
  - cmd: pyinstaller GestorRPI_Win.spec --noconfirm

  # Verificar que existen browsers de Playwright
  - ps: |
      $base = "$env:LOCALAPPDATA\ms-playwright"
      $dirs = Get-ChildItem $base -Directory
      if (-not $dirs) {
        Write-Error "No se encontraron browsers de Playwright en $base"
        exit 1
      }
      Write-Host "Browsers encontrados:"
      $dirs | ForEach-Object { Write-Host "  $($_.Name)" }

  # Armar carpeta de distribución
  - cmd: mkdir GestorRPI_Win
  - cmd: xcopy /E /I dist\GestorRPI GestorRPI_Win
  - cmd: mkdir GestorRPI_Win\browsers
  - ps: |
      $base = "$env:LOCALAPPDATA\ms-playwright"
      Get-ChildItem $base -Directory | ForEach-Object {
        Write-Host "Copiando: $($_.Name)"
        Copy-Item -Recurse -Force $_.FullName "GestorRPI_Win\browsers\"
      }
  - cmd: copy LEEME.txt GestorRPI_Win\

  # Comprimir
  - ps: Compress-Archive -Path "GestorRPI_Win\*" -DestinationPath "GestorRPI_Win.zip" -Force
  - ps: $size = (Get-Item "GestorRPI_Win.zip").length / 1MB; Write-Host "ZIP $([math]::Round($size,1)) MB"

artifacts:
  - path: GestorRPI_Win.zip
    name: GestorRPI_Win
